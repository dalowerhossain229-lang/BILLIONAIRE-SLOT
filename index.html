<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BILLIONAIRE SLOT VIP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🎰 ক্যাসিনো হেডার প্যানেল -->
    <div class="header">
        <div class="brand">
            <div class="name">BILLIONAIRE</div>
            <div class="game">3x5 ASIAN LUXURY SLOT</div>
        </div>
        <div class="header-right">
            <button class="sound-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
            <div class="balance-box">৳ <span id="user-balance">0.00</span></div>
        </div>
    </div>

    <!-- 🎰 [৩x৫ মেগা স্লট মেশিন জোন] (পিউর বিলিয়নেয়ার লোকাল থিম ভাই ভাই) -->
    <div class="slot-machine-zone">
        <div class="slot-window-frame">
            <canvas id="slot-canvas" width="350" height="240"></canvas>
        </div>
    </div>

    <!-- 🏆 ইন-লাইন লাইভ স্কোরিং মেসেজ বার -->
    <div class="win-status-container" id="win-status-box">
        <span id="win-text-msg">বেট সিলেক্ট করে SPIN বোতাম চাপুন ভাই, বিলিয়নেয়ার লাক অন ফায়ার!</span>
    </div>

    <!-- 🎛️ কন্ট্রোল প্যানেল এরিয়া (৳১-৳২০০০ প্লাস-মাইনাস ও SPIN বোতাম পাশাপাশি লক ভাই) -->
    <div class="footer-controls">
        <div class="play-section">
            <div class="bet-selector">
                <button class="bet-btn-nav" onclick="adjustBet('minus')">−</button>
                <div style="text-align: center; width: 60px;">
                    <div style="font-size: 9px; color: #aaa; font-weight: bold;">BET</div>
                    <div style="font-size: 15px; font-weight: 900; color: #fff;" id="bet-display">৳৫০</div>
                </div>
                <button class="bet-btn-nav" onclick="adjustBet('plus')">+</button>
            </div>

            <button class="play-btn" id="spin-btn" onclick="handleBillionaireSpin()">SPIN</button>

            <div class="icon-group">
                <button class="icon-btn" id="auto-btn" onclick="toggleAuto()">🔄</button>
            </div>
        </div>
    </div>

    <!-- 🔌 [উইনগো কালার ট্রেড সিঙ্ক - ইউনিভার্সাল সকেট ইঞ্জিন লাইব্রেরি ভাই] -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const urlUserId = urlParams.get('userId') || urlParams.get('id') || urlParams.get('username') || "guest_user";
        const urlWallet = urlParams.get('wallet') || "main";
        
        const SERVER_URL = window.location.origin;

        const canvas = document.getElementById("slot-canvas");
        const ctx = canvas.getContext("2d");

        let balance = 0.00;
        let currentBet = 50; 
        let isSpinning = false; 
        let isAuto = false;
        let isMuted = false;
        let autoInterval = null;

        // 🕌🛺🎒🫓👦 ৩x৫ গ্রিডের ওরিজিনাল বিলিয়নেয়ার আইকন মেমোরি ম্যাপ ভাই ভাই
        const iconSymbols = {
            "TAJMAHAL": "🕌", "AUTO": "🛺", "BACKPACK": "🎒", "FOOD": "🫓", "BOY": "👦", "ACE": "A", "KING": "K", "QUEEN": "Q"
        };

        // ৫টি রিল কলাম (প্রতিটিতে ৩টি করে রো আইকন বসবে ভাই ভাই)
        let reels = [
            { symbols: ["🕌", "🛺", "🎒"], y: 0, speed: 0, targetY: 0 },
            { symbols: ["🛺", "🎒", "🫓"], y: 0, speed: 0, targetY: 0 },
            { symbols: ["🎒", "🫓", "👦"], y: 0, speed: 0, targetY: 0 },
            { symbols: ["🫓", "👦", "A"], y: 0, speed: 0, targetY: 0 },
            { symbols: ["👦", "A", "K"], y: 0, speed: 0, targetY: 0 }
        ];

        const reelWidth = 66;
        const reelHeight = 240;
        const itemHeight = 76;
        const startX = (canvas.width - (5 * reelWidth)) / 2;

        function renderBillionaireMachine() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // ৫টি রিল গ্রিড লাক্সারি গোল্ডেন ক্যাসিনো ডিজাইন ভাই ভাই
            for (let i = 0; i < 5; i++) {
                const rx = startX + (i * reelWidth);
                
                ctx.fillStyle = "#0f1524";
                ctx.fillRect(rx, 0, reelWidth - 4, reelHeight);
                ctx.strokeStyle = "#2a1d42";
                ctx.lineWidth = 1.5;
                ctx.strokeRect(rx, 0, reelWidth - 4, reelHeight);

                ctx.save();
                ctx.beginPath();
                ctx.rect(rx, 0, reelWidth - 4, reelHeight);
                ctx.clip();

                const currentY = reels[i].y;
                const totalItems = reels[i].symbols.length;

                for (let j = -2; j < totalItems + 2; j++) {
                    const index = (j + totalItems * 10) % totalItems;
                    const sym = reels[i].symbols[index];
                    const py = (j * itemHeight) + (currentY % itemHeight);

                    // স্লট বক্স লাইভ কার্ড কার্ড ব্যাকগ্রাউন্ড ভাই ভাই
                    ctx.fillStyle = "#ffffff10";
                    ctx.fillRect(rx + 2, py + 2, reelWidth - 8, itemHeight - 4);

                    ctx.fillStyle = "#ffffff";
                    // এশিয়ান কালচারাল ইমোজি আইকনগুলোর জন্য বিশেষ ফন্ট সাইজ ফিল্টার ভাই ভাই
                    if (sym === "A" || sym === "K" || sym === "Q") {
                        ctx.font = "bold 26px Arial";
                        ctx.fillStyle = "#f1c40f";
                    } else {
                        ctx.font = "34px Arial";
                    }
                    
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    
                    ctx.shadowColor = "#f1c40f";
                    ctx.shadowBlur = isSpinning ? 6 : 0;
                    ctx.fillText(sym, rx + (reelWidth - 4)/2, py + itemHeight/2);
                    ctx.shadowBlur = 0;
                }
                ctx.restore();
            }

            // মাঝখানের কিলার রেড উইন লাইন ট্র্যাকার ভাই ভাই
            ctx.strokeStyle = "rgba(255, 154, 0, 0.6)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(startX, canvas.height / 2);
            ctx.lineTo(startX + (5 * reelWidth) - 4, canvas.height / 2);
            ctx.stroke();
        }

        // 🧠 [৫-রিল হাই-স্পিড স্মুথ স্ক্রলিং এনিমেশন লুপ ইঞ্জিন ভাই ভাই]
        function updateSlotAnimation() {
            let stillSpinning = false;

            for (let i = 0; i < 5; i++) {
                if (reels[i].speed > 0.2) {
                    reels[i].y += reels[i].speed;
                    reels[i].speed *= 0.95; // ফ্রিকশন ব্রেক
                    stillSpinning = true;
                } else if (reels[i].speed > 0) {
                    reels[i].speed = 0;
                    reels[i].y = reels[i].targetY;
                    playAudio('click1'); // রিল লক হওয়ার খুটখুট সাউন্ড ভাই ভাই
                }
            }

            renderBillionaireMachine();

            if (stillSpinning) {
                requestAnimationFrame(updateSlotAnimation);
            } else {
                isSpinning = false;
                if (!isAuto) document.getElementById("spin-btn").disabled = false;
            }
        }

        if (typeof io !== 'undefined') {
            const socket = io();
            socket.on("balanceUpdate", (data) => {
                if (data && data.username === urlUserId) {
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    fetchLiveBalance();
                }
            });
        }

        async function fetchLiveBalance() {
            try {
                const response = await fetch(`${SERVER_URL}/api/billionaire-balance?userId=${urlUserId}&wallet=${urlWallet}`);
                const data = await response.json();
                if (data && data.success) {
                    balance = parseFloat(data.balance);
                    document.getElementById("user-balance").innerText = balance.toFixed(2);
                }
            } catch (e) { console.error("Balance lag"); }
        }

        window.onload = () => {
            if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
            fetchLiveBalance();
            renderBillionaireMachine();
        };

        function adjustBet(action) {
            if (isSpinning) return;
            if (action === 'minus' && currentBet > 1) {
                if (currentBet <= 10) currentBet -= 1;
                else if (currentBet <= 100) currentBet -= 10;
                else currentBet -= 50;
            }
            if (action === 'plus' && currentBet < 2000) {
                if (currentBet < 10) currentBet += 1;
                else if (currentBet < 100) currentBet += 10;
                else currentBet += 50;
            }
            if (currentBet < 1) currentBet = 1;
            if (currentBet > 2000) currentBet = 2000;
            
            document.getElementById("bet-display").innerText = `৳${currentBet}`;
            playAudio('click');
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById("mute-btn").innerText = isMuted ? "🔇" : "🔊";
            document.getElementById("mute-btn").classList.toggle("muted-active", isMuted);
        }

                function toggleAuto() {
            isAuto = !isAuto;
            document.getElementById("auto-btn").classList.toggle("active", isAuto);
            if (isAuto && !isSpinning) handleBillionaireSpin();
            playAudio('click');
        }

        async function handleBillionaireSpin() {
            if (isSpinning) return;

            document.getElementById("win-status-box").className = "win-status-container";
            document.getElementById("win-text-msg").innerText = "🕌 ৩x৫ বিলিয়নেয়ার রিল ঘুরছে...";

            isSpinning = true;
            document.getElementById("spin-btn").disabled = true;
            
            playAudio('click');
            playAudio('spin'); // 🚀 রিল ওড়ার কড়া ক্যাসিনো spin2.mp3 সাউন্ড ফায়ার লক ভাই!

            // ৫টি রিল কলাম এক টানা স্পিডে স্ক্রলিং এনিমেশন মোড চালু ভাই ভাই
            reels.forEach(r => {
                r.speed = 18 + (Math.random() * 8); // ডাইনামিক র্যান্ডম স্পিড রান ভাই ভাই
            });
            requestAnimationFrame(updateSlotAnimation);

            try {
                const response = await fetch(`${SERVER_URL}/api/billionaire-spin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: urlUserId,
                        amount: parseFloat(currentBet),
                        wallet: urlWallet
                    })
                });

                const data = await response.json();

                if (data && data.success === true) {
                    balance = parseFloat(data.balance);
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    if (window.top) window.top.postMessage({ action: "refresh_wallet" }, "*");

                    // 🎯 [রিল স্টপিং ফিজিক্স গাইড চাবি]: ব্যাকএন্ডের লোকাল ক্যাসিনো ডাটা অনুযায়ী ৫টি রিলকে এক ফ্রেমে এলাইন লক!
                    setTimeout(() => { reels[0].symbols = data.col1; reels[0].targetY = 0; }, 800);
                    setTimeout(() => { reels[1].symbols = data.col2; reels[1].targetY = 0; }, 1100);
                    setTimeout(() => { reels[2].symbols = data.col3; reels[2].targetY = 0; }, 1400);
                    setTimeout(() => { reels[3].symbols = data.col4; reels[3].targetY = 0; }, 1700);
                    
                    setTimeout(() => {
                        reels[4].symbols = data.col5; reels[4].targetY = 0;
                        
                        // ৫টি রিল সম্পূর্ণ লক হওয়ার পর ফাইনাল রিওয়ার্ড প্রফিট শোডাউন হবে ভাই
                        setTimeout(() => {
                            showFinalReward(data.status, data.winAmount, data.combination, data.multiplier);
                        }, 500);
                    }, 2000);

                } else {
                    reels.forEach(r => r.speed = 0.5);
                    alert(data.message || "❌ Insufficient Balance! Please Recharge.");
                    stopSlotState();
                }
            } catch (err) {
                reels.forEach(r => r.speed = 0.5);
                alert("⚠️ সেশন আউট! আবার SPIN বোতাম চাপুন ভাই ভাই।");
                stopSlotState();
            }
        }

        function showFinalReward(status, winAmount, combination, multiplier) {
            const msgBox = document.getElementById("win-status-box");
            const textMsg = document.getElementById("win-text-msg");

            // ৫টি উইন লাইনের আইকন ম্যাপ কনভার্টার চাবি ভাই ভাই
            const iconTextMap = {
                "TAJMAHAL": "🕌 তাজমহল", "AUTO": "🛺 সিএনজি", "BACKPACK": "🎒 ব্যাগ", "FOOD": "🫓 কাচ্চি", "BOY": "👦 বয়"
            };
            const showName = iconTextMap[combination] || combination;

            if (status === "win") {
                if (multiplier >= 10) {
                    playAudio('bigwin'); // 🚀 ১০ গুণের বেশি মেগা জ্যাকপট ব্লাস্ট হলে bigwin1.mp3 ভাই ভাই
                } else {
                    playAudio('win'); // 🚀 সাধারণ লাইন প্রফিট উইন হলে win2.mp3 ভাই ভাই
                }
                msgBox.className = "win-status-container win-glow-bar";
                textMsg.innerText = `🏆 মেগা উইন!! কম্বিনেশন মিলেছে: [${showName}] (${multiplier}X) = ৳${winAmount}`;
            } else {
                playAudio('wheel'); // 🚀 আইকন অমিল বা লস হলে wheel1.mp3 ব্যাকআপ সাউন্ড ফায়ার লক!
                msgBox.className = "win-status-container lose-glow-bar";
                textMsg.innerText = "❌ ওহ! এই রাউন্ডে লাইন মেলেনি ভাই। আবার ট্রাই করুন ভাই ভাই!";
            }

            document.getElementById("user-balance").innerText = balance.toFixed(2);
            stopSlotState();

            if (isAuto) {
                autoInterval = setTimeout(() => {
                    if (isAuto) handleBillionaireSpin();
                }, 2000);
            }
        }

        function stopSlotState() {
            isSpinning = false;
            document.getElementById("spin-btn").disabled = false;
            if (!isAuto && autoInterval) clearTimeout(autoInterval);
        }

        // 🎯 [৫টি প্রিমিয়াম ক্যাসিনো সাউন্ড ও বাফার গেটওয়ে লক ভাই ভাই]
        const slotSounds = {
            click: new Audio('click2.mp3'),   // 🚀 বাটন ক্লিক
            spin: new Audio('spin2.mp3'),     // 🚀 শোঁ শোঁ রিল ঘূর্ণন সাউন্ড
            click1: new Audio('click1.mp3'),   // 🚀 রিল খুটখুট করে লক হওয়ার সাউন্ড
            win: new Audio('win2.mp3'),       // 🚀 নরমাল লাইন উইন
            bigwin: new Audio('bigwin1.mp3'), // 🚀 মেগা জ্যাকপট ব্লাস্ট
            wheel: new Audio('wheel1.mp3')    // 🚀 লস ব্যাকআপ সাউন্ড
        };
        Object.values(slotSounds).forEach(s => s.load());

        function playAudio(type) { 
            if (isMuted) return; // 🔇 সাউন্ড অফ থাকলে কোনো অডিও প্লে হবে না ভাই ভাই!
            try { 
                slotSounds[type].currentTime = 0; 
                slotSounds[type].play(); 
            } catch(e){} 
        }
    </script>
</body>
</html>
